services:
  - type: web
    name: sync-player-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: CORS_ORIGINS
        value: "*"
      - key: BOT_TOKEN
        sync: false
    autoDeploy: true

  - type: web
    name: sync-player-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://sync-player-api.onrender.com/api
      - key: VITE_WS_URL
        value: wss://sync-player-api.onrender.com/api
      - key: VITE_BOT_NAME
        value: SyncPlayerBot
    autoDeploy: true
